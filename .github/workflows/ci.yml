name: ci

on:
  push:
    branches: [main]
    paths:
      - 'lua/**'
      - 'init.lua'
      - '*.toml'
      - '*.json'
      - 'lazy-lock.json'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'lua/**'
      - 'init.lua'
      - '*.toml'
      - '*.json'
      - 'lazy-lock.json'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  packages: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: nvim-ci:local
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ github.repository }}/nvim-ci:latest
          cache-to: type=gha,mode=max

      - run: |
          docker run --rm \
            --entrypoint stylua \
            -v ${{ github.workspace }}:/workspace \
            nvim-ci:local \
            --check /workspace
