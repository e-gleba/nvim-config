name: ci

on:
  push:
    branches: [main]
    paths:
      - 'lua/**'
      - 'init.lua'
      - '*.toml'
      - '*.json'
      - 'lazy-lock.json'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'lua/**'
      - 'init.lua'
      - '*.toml'
      - '*.json'
      - 'lazy-lock.json'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          load: true
          tags: nvim-ci:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: docker run --rm -v ${{ github.workspace }}:/workspace nvim-ci:local stylua --check /workspace
