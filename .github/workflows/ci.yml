name: ci

on:
  push:
    branches: [main]
    paths:
      - 'lua/**'
      - 'init.lua'
      - '*.toml'
      - '*.json'
      - 'lazy-lock.json'
  pull_request:
    paths:
      - 'lua/**'
      - 'init.lua'
      - '*.toml'
      - '*.json'
      - 'lazy-lock.json'

permissions:
  contents: read
  packages: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run stylua
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/${{ github.repository }}/nvim-ci:latest \
            stylua --check /workspace
